<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">ZEAD // 4NG3L CONTROL</title>
  <desc id="desc">Dark cyberdeck-style profile banner for ZEAD and 4NG3L.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06090c"/>
      <stop offset="0.55" stop-color="#0b1014"/>
      <stop offset="1" stop-color="#172018"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d5ff" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#00d5ff"/>
      <stop offset="1" stop-color="#00d5ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b2a31" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)" opacity="0.75"/>

  <path d="M40 52 H1240 V368 H40 Z" fill="none" stroke="#23323a" stroke-width="2"/>
  <path d="M72 84 H1208 V336 H72 Z" fill="#0b0f12" opacity="0.72" stroke="#32454b" stroke-width="1"/>

  <g opacity="0.9">
    <path d="M94 108 H336" stroke="url(#cyan)" stroke-width="2" filter="url(#glow)"/>
    <path d="M944 108 H1186" stroke="url(#cyan)" stroke-width="2" filter="url(#glow)"/>
    <path d="M94 312 H284" stroke="#ffb000" stroke-width="2" opacity="0.75"/>
    <path d="M996 312 H1186" stroke="#ffb000" stroke-width="2" opacity="0.75"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="96" y="138" fill="#5f6f52" font-size="18" letter-spacing="3">OPERATOR NODE</text>
    <text x="96" y="216" fill="#e8e1d4" font-size="86" font-weight="800" letter-spacing="7">ZEAD</text>
    <text x="96" y="260" fill="#00d5ff" font-size="28" letter-spacing="4" filter="url(#glow)">4NG3L CONTROL / LOCAL-FIRST SYSTEMS</text>
    <text x="96" y="296" fill="#ffb000" font-size="20" letter-spacing="2">GOVERNED AGENTS . EVIDENCE TRAILS . NO SILENT EXECUTION</text>

    <g transform="translate(782 138)">
      <rect x="0" y="0" width="392" height="142" rx="8" fill="#101820" stroke="#31454c"/>
      <text x="24" y="38" fill="#00d5ff" font-size="18">STATUS</text>
      <text x="128" y="38" fill="#e8e1d4" font-size="18">BUILDING</text>
      <text x="24" y="72" fill="#00d5ff" font-size="18">CORE</text>
      <text x="128" y="72" fill="#e8e1d4" font-size="18">STRICT</text>
      <text x="24" y="106" fill="#00d5ff" font-size="18">FRONT</text>
      <text x="128" y="106" fill="#e8e1d4" font-size="18">HUMANE</text>
      <path d="M24 122 H368" stroke="#ffb000" stroke-width="2" opacity="0.65"/>
    </g>
  </g>

  <circle cx="1196" cy="84" r="7" fill="#ff2d55" opacity="0.85"/>
  <circle cx="1168" cy="84" r="7" fill="#ffb000" opacity="0.85"/>
  <circle cx="1140" cy="84" r="7" fill="#00d5ff" opacity="0.85"/>
</svg>

